<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shweatha ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
/* ============================================================
   HAPPY BIRTHDAY SHWEATHA  ·  Ghibli × Disney
   ============================================================ */
:root{
  --red:#d72645; --darkred:#88172f;
  --pink:#ffd9e4; --lightpink:#fff0f5;
  --gold:#f7d774; --amber:#ffb347;
  --white:#ffffff; --black:#08090d;
  --sky:#0c1226;  --purple:#22163d;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:linear-gradient(to bottom,#071220,#111827,#170b1d);
  color:#fff; font-family:"Poppins",sans-serif; overflow-x:hidden;
}
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:#0d0d18;}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--red),#ff5c8d);border-radius:50px;}

/* ── LOADER ─────────────────────────────────────────── */
#loader{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#04080f,#0c1a30,#120824);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  z-index:9999;gap:22px;transition:opacity .9s,visibility .9s;
}
#loader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.loaderMoon{
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fffde8,#f7e87a,#e8c84a);
  box-shadow:0 0 40px rgba(255,230,100,.7),0 0 90px rgba(255,200,80,.35);
  animation:loaderPulse 2s ease-in-out infinite;
}
@keyframes loaderPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}
#loader h1{font-family:"Cinzel",serif;font-size:clamp(16px,3vw,22px);color:#ffd9e4;text-align:center;}
#loader p{font-size:13px;color:rgba(255,255,255,.55);text-align:center;}
.loaderDots{display:flex;gap:9px;}
.loaderDots span{width:9px;height:9px;border-radius:50%;background:var(--pink);animation:dotBounce 1.2s ease-in-out infinite;}
.loaderDots span:nth-child(2){animation-delay:.2s;}
.loaderDots span:nth-child(3){animation-delay:.4s;}
@keyframes dotBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}

/* ── BACKGROUND LAYERS ──────────────────────────────── */
#nightSky{
  position:fixed;inset:0;
  background:radial-gradient(circle at top,#1b2553,#0b1023 60%,#04060a);
  z-index:-20;
}
#moonGlow{
  position:fixed;top:80px;right:120px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,220,.95),rgba(255,255,190,.4),transparent);
  filter:blur(20px);z-index:-18;animation:moonFloat 8s ease-in-out infinite;
}
@keyframes moonFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
#stars{
  position:fixed;width:100%;height:100%;top:0;left:0;
  background-image:
    radial-gradient(white 1px,transparent 1px),
    radial-gradient(#ffd56a 1px,transparent 1px),
    radial-gradient(rgba(255,255,255,.8) 1px,transparent 1px);
  background-size:130px 130px,180px 180px,250px 250px;
  opacity:.65;animation:starMove 120s linear infinite;z-index:-19;
}
@keyframes starMove{
  from{background-position:0 0,0 0,0 0;}
  to{background-position:0 500px,0 900px,0 1200px;}
}
#cloudLayer1,#cloudLayer2{
  position:fixed;width:250%;height:280px;left:-50%;
  opacity:.09;background-repeat:repeat-x;z-index:-17;
}
#cloudLayer1{top:90px;animation:cloudMove1 90s linear infinite;}
#cloudLayer2{top:200px;animation:cloudMove2 140s linear infinite;}
@keyframes cloudMove1{from{transform:translateX(0);}to{transform:translateX(-900px);}}
@keyframes cloudMove2{from{transform:translateX(-600px);}to{transform:translateX(400px);}}

#cloudLayer1{
  background:
    radial-gradient(ellipse 80px 40px at 100px 140px,rgba(255,255,255,1),transparent),
    radial-gradient(ellipse 120px 50px at 280px 150px,rgba(255,255,255,1),transparent),
    radial-gradient(ellipse 90px 45px at 500px 130px,rgba(255,255,255,1),transparent),
    radial-gradient(ellipse 140px 55px at 750px 145px,rgba(255,255,255,1),transparent),
    radial-gradient(ellipse 100px 48px at 1000px 135px,rgba(255,255,255,1),transparent);
}
#cloudLayer2{
  background:
    radial-gradient(ellipse 110px 50px at 200px 150px,rgba(255,255,255,1),transparent),
    radial-gradient(ellipse 90px 42px at 450px 155px,rgba(255,255,255,1),transparent),
    radial-gradient(ellipse 130px 55px at 700px 148px,rgba(255,255,255,1),transparent),
    radial-gradient(ellipse 100px 44px at 950px 142px,rgba(255,255,255,1),transparent);
}

.firefly{
  position:absolute;width:6px;height:6px;background:#fff9b2;border-radius:50%;
  box-shadow:0 0 12px #fff9b2,0 0 24px #ffe44d;
  animation:fly 14s linear infinite;
}
@keyframes fly{
  0%{transform:translate(0,0);opacity:0;}
  25%{opacity:1;}
  50%{transform:translate(130px,-110px);}
  75%{opacity:.8;}
  100%{transform:translate(-90px,-240px);opacity:0;}
}
.petal{
  position:absolute;border-radius:50% 0 50% 0;opacity:.75;
  animation:petalFall linear infinite;
}
@keyframes petalFall{
  0%{transform:translateY(-120px) rotate(0deg);}
  100%{transform:translateY(110vh) rotate(720deg);}
}

/* ── CURSOR GLOW ─────────────────────────────────────── */
#cursorGlow{
  position:fixed;width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,150,200,.5),transparent);
  pointer-events:none;z-index:9990;transform:translate(-50%,-50%);
  transition:width .25s,height .25s;
}

/* ── MUSIC BTN ───────────────────────────────────────── */
#musicButton{
  position:fixed;bottom:28px;right:28px;z-index:999;
  padding:12px 24px;border-radius:50px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#d72645,#ff7aa5);
  color:#fff;font-size:13px;font-weight:600;letter-spacing:.5px;
  box-shadow:0 8px 25px rgba(215,38,69,.4);transition:.3s;
}
#musicButton:hover{transform:scale(1.06);}

/* ── SCROLL REVEAL ───────────────────────────────────── */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .85s,transform .85s;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ── SHARED SECTION STYLES ──────────────────────────── */
section{padding:110px 30px;text-align:center;position:relative;}
.sectionTitle{
  font-family:"Cinzel",serif;font-size:clamp(24px,4vw,42px);
  background:linear-gradient(90deg,#ffd5df,#ffe89a,#ffd5df);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:16px;
}
.sectionSubtitle{font-size:17px;opacity:.72;margin-bottom:48px;}
.container{max-width:800px;margin:0 auto;}

/* ── HERO ────────────────────────────────────────────── */
#hero{
  position:relative;min-height:100vh;
  display:flex;justify-content:center;align-items:center;
  overflow:hidden;padding:120px 30px;
}
.heroOverlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.45),rgba(0,0,0,.78));
}
.castleSilhouette{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:min(700px,95vw);height:280px;opacity:.09;
  animation:castleFloat 8s ease-in-out infinite;
}
.castleSilhouette svg{width:100%;height:100%;}
@keyframes castleFloat{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-10px);}
}
.heroContent{position:relative;max-width:920px;z-index:5;text-align:center;}
.welcomeTag{
  display:inline-block;padding:10px 32px;border-radius:50px;
  background:rgba(255,255,255,.07);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.12);
  font-size:12px;letter-spacing:3.5px;text-transform:uppercase;
  margin-bottom:36px;color:#ffd8df;
}
.heroContent h1{
  font-family:"Cinzel",serif;
  font-size:clamp(52px,10vw,115px);font-weight:700;line-height:1;
  background:linear-gradient(90deg,#ffffff,#ffd5df,#ffe89a,#ffffff);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shineText 10s linear infinite;
}
@keyframes shineText{0%{background-position:0%;}100%{background-position:300%;}}
.heroContent h2{
  margin-top:18px;font-family:"Cinzel",serif;
  font-size:clamp(34px,6vw,68px);font-weight:600;color:#ff9cbc;
  text-shadow:0 0 18px rgba(255,120,180,.6);
}
.heroContent p{
  margin:38px auto;max-width:640px;font-size:19px;
  line-height:2;font-weight:300;color:#f5f5f5;opacity:.9;
}
#journeyButton{
  padding:18px 64px;font-size:17px;border:none;border-radius:60px;
  cursor:pointer;background:linear-gradient(135deg,#d72645,#ff7aa5);
  color:#fff;font-weight:600;transition:.45s;
  box-shadow:0 15px 38px rgba(215,38,69,.35);
}
#journeyButton:hover{transform:translateY(-6px) scale(1.04);box-shadow:0 26px 60px rgba(255,60,130,.45);}
.scrollDown{
  position:absolute;bottom:38px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;opacity:.65;
}
.scrollDown span{letter-spacing:4px;font-size:11px;text-transform:uppercase;}
.scrollDown .line{
  width:2px;height:66px;
  background:linear-gradient(white,transparent);
  animation:scrollLine 2s infinite;
}
@keyframes scrollLine{0%{height:28px;opacity:.2;}50%{height:66px;opacity:1;}100%{height:28px;opacity:.2;}}

/* ── STORY INTRO ─────────────────────────────────────── */
#storyIntro{
  background:linear-gradient(to bottom,transparent,rgba(30,10,50,.5),transparent);
}
#storyIntro h2{
  font-family:"Cinzel",serif;font-size:clamp(26px,5vw,50px);
  color:#ffe89a;margin-bottom:40px;
  text-shadow:0 0 22px rgba(255,230,100,.4);
}
#storyIntro p{
  font-size:20px;line-height:2.2;color:rgba(255,255,255,.85);
  font-weight:300;max-width:700px;margin:0 auto;
}

/* ── PATHWAY ─────────────────────────────────────────── */
#pathway{
  padding:120px 30px;
  background:radial-gradient(ellipse at center,rgba(100,30,80,.3),transparent 70%);
}
#pathway h2{font-family:"Cinzel",serif;font-size:clamp(24px,4vw,42px);color:#ffd8df;margin-bottom:18px;}
#pathway>p{font-size:18px;opacity:.72;}
.magicRoad{
  width:4px;height:220px;
  background:linear-gradient(to bottom,transparent,#ffd9e4 40%,#ff9cbc,transparent);
  margin:54px auto;border-radius:4px;
  box-shadow:0 0 24px rgba(255,180,210,.6);
  animation:roadGlow 3s ease-in-out infinite;
}
@keyframes roadGlow{0%,100%{opacity:.4;}50%{opacity:1;}}
.floatingLantern{
  position:absolute;width:22px;height:32px;
  border-radius:50% 50% 40% 40%;
  background:linear-gradient(to bottom,#ffdd88,#ff8800);
  box-shadow:0 0 20px rgba(255,180,50,.7),0 0 50px rgba(255,180,50,.3);
  animation:lanternRise 11s ease-in-out infinite;
}
.lantern1{left:14%;top:65%;animation-delay:0s;}
.lantern2{left:76%;top:52%;animation-delay:2.8s;}
.lantern3{left:34%;top:72%;animation-delay:5.5s;}
.lantern4{left:62%;top:60%;animation-delay:7.5s;}
@keyframes lanternRise{
  0%{transform:translateY(0) rotate(-5deg);opacity:.9;}
  50%{transform:translateY(-90px) rotate(5deg);opacity:.5;}
  100%{transform:translateY(-180px) rotate(-2deg);opacity:0;}
}

/* ── LETTER INTRO ────────────────────────────────────── */
#letterIntro{padding:120px 30px;}
#letterIntro h2{font-family:"Cinzel",serif;font-size:clamp(22px,4vw,40px);color:#ffd8df;margin-bottom:14px;}
#letterIntro p{font-size:17px;opacity:.7;margin-bottom:58px;}
#envelope{
  width:200px;height:138px;margin:0 auto;position:relative;cursor:pointer;
  transition:.3s;filter:drop-shadow(0 0 22px rgba(215,38,69,.45));
}
#envelope:hover{transform:scale(1.06) rotate(1deg);}
.envelopeBack{
  position:absolute;inset:0;background:linear-gradient(145deg,#8b1a2e,#c0284a);
  border-radius:8px;clip-path:polygon(0 0,100% 0,100% 55%,50% 100%,0 55%);
}
.envelopeFront{
  position:absolute;inset:0;background:linear-gradient(145deg,#d72645,#e8486a);
  border-radius:8px;clip-path:polygon(0 0,100% 0,100% 100%,50% 58%,0 100%);
}
.envelopeFlap{
  position:absolute;top:0;left:0;right:0;height:55%;
  background:linear-gradient(145deg,#a02038,#d72645);
  clip-path:polygon(0 0,100% 0,50% 100%);
  border-radius:8px 8px 0 0;
  transform-origin:top;transition:transform .6s;
}
#envelope:hover .envelopeFlap{transform:rotateX(160deg);}
.waxSeal{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  font-size:28px;z-index:5;animation:sealPulse 2s ease-in-out infinite;
}
@keyframes sealPulse{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.14);}}

/* ── LETTER POPUP ────────────────────────────────────── */
#letterPopup{
  position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);
  z-index:8888;display:none;justify-content:center;align-items:center;padding:30px;
}
#letterPopup.visible{display:flex;}
.letterPaper{
  background:linear-gradient(148deg,#fff8f0,#ffeef4,#fff6fb);
  border-radius:18px;padding:52px 52px 44px;
  max-width:640px;width:100%;position:relative;color:#3a2030;
  box-shadow:0 32px 90px rgba(0,0,0,.55);
  animation:paperSlide .5s cubic-bezier(.22,1,.36,1);
  max-height:88vh;overflow-y:auto;
}
.letterPaper::before{
  content:"";position:absolute;left:70px;top:0;bottom:0;width:1px;
  background:rgba(215,38,69,.15);
}
@keyframes paperSlide{from{transform:translateY(44px) scale(.97);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
.letterPaper h2{font-family:"Cinzel",serif;font-size:24px;margin-bottom:26px;color:#8b1a2e;}
#typedLetter{font-size:15.5px;line-height:2.1;color:#4a2035;min-height:80px;}
#closeLetter{
  position:absolute;top:18px;right:22px;font-size:17px;
  cursor:pointer;color:#8b1a2e;opacity:.6;transition:.2s;
}
#closeLetter:hover{opacity:1;transform:scale(1.2);}

/* ── MEMORIES / POLAROID GALLERY ─────────────────────── */
#memoriesSection{
  padding:120px 30px;
  background:radial-gradient(ellipse at center,rgba(30,10,60,.4),transparent 70%);
}
#memoriesSection h2{font-family:"Cinzel",serif;font-size:clamp(24px,4vw,40px);color:#ffe89a;margin-bottom:16px;text-shadow:0 0 20px rgba(255,220,100,.4);}
#memoriesSection>p{font-size:17px;opacity:.7;margin-bottom:56px;}
.polaroidGrid{
  display:flex;flex-wrap:wrap;gap:32px;justify-content:center;max-width:900px;margin:0 auto;
}
.polaroid{
  background:#fff;padding:18px 18px 48px;border-radius:4px;
  width:180px;
  box-shadow:0 12px 40px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.2);
  transform:rotate(var(--rot));transition:.4s;cursor:pointer;position:relative;
}
.polaroid:hover{transform:rotate(0deg) scale(1.08);z-index:10;}
.polaroid .polaroidInner{
  width:100%;height:130px;border-radius:2px;
  display:flex;align-items:center;justify-content:center;font-size:42px;
  background:var(--bg);
}
.polaroid .polaroidCaption{
  position:absolute;bottom:12px;left:0;right:0;text-align:center;
  font-family:"Poppins",sans-serif;font-size:11px;color:#555;
  letter-spacing:.3px;
}
.polaroid:nth-child(1){--rot:-3deg;--bg:linear-gradient(135deg,#ffe0ec,#ffb3cc);}
.polaroid:nth-child(2){--rot:2deg; --bg:linear-gradient(135deg,#d4f0ff,#a8d8ff);}
.polaroid:nth-child(3){--rot:-2deg;--bg:linear-gradient(135deg,#fff3cc,#ffe080);}
.polaroid:nth-child(4){--rot:3.5deg;--bg:linear-gradient(135deg,#d8ffd8,#a0e8a0);}
.polaroid:nth-child(5){--rot:-1.5deg;--bg:linear-gradient(135deg,#f0d8ff,#d4a0ff);}
.polaroid:nth-child(6){--rot:2.5deg; --bg:linear-gradient(135deg,#ffd8d0,#ffaa90);}

/* ── FLOWER GARDEN ───────────────────────────────────── */
#flowerGarden{
  padding:120px 30px 100px;
  background:radial-gradient(ellipse at center,rgba(60,10,30,.4),transparent 70%);
  overflow:hidden;
}
.garden{
  display:flex;justify-content:center;gap:50px;align-items:flex-end;
  height:230px;margin:52px auto 44px;flex-wrap:wrap;
}
.gerbera{display:flex;flex-direction:column;align-items:center;position:relative;}
.stem{width:5px;height:120px;border-radius:4px;background:linear-gradient(to bottom,#4a8c3f,#2e6e29);}
.bloom{
  width:74px;height:74px;border-radius:50%;position:absolute;top:-4px;
  animation:bloomSway 4.5s ease-in-out infinite;
  box-shadow:0 0 28px rgba(255,180,200,.4);
}
.gerbera.pink .bloom{background:radial-gradient(circle at 35% 35%,#fff,#ffb3d1 45%,#e8558a);}
.gerbera.white .bloom{background:radial-gradient(circle at 35% 35%,#fff,#f0e8ff 45%,#c8a8f0);}
.gerbera.red .bloom{background:radial-gradient(circle at 35% 35%,#fff8f0,#ff7090 45%,#cc1a3a);}
.gerbera:nth-child(2){animation-delay:1.2s;}
.gerbera:nth-child(3){animation-delay:2.4s;}
@keyframes bloomSway{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.bloom::after{
  content:"";position:absolute;inset:-10px;border-radius:50%;
  border:10px solid transparent;
  background:inherit;background-clip:padding-box;
  opacity:.3;filter:blur(4px);
}
.floatingButterflies{font-size:28px;margin-top:22px;}
.floatingButterflies span{
  display:inline-block;margin:0 14px;
  animation:butterflyFloat 6s ease-in-out infinite;
}
.floatingButterflies span:nth-child(2){animation-delay:1.5s;}
.floatingButterflies span:nth-child(3){animation-delay:3s;}
.floatingButterflies span:nth-child(4){animation-delay:4.5s;}
@keyframes butterflyFloat{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-22px) rotate(5deg);}}

/* ── GIFT SECTION ────────────────────────────────────── */
#giftSection{padding:120px 30px;}
#giftSection h2{margin-bottom:14px;}
#giftSection>p{font-size:17px;opacity:.7;margin-bottom:60px;}
#giftBox{
  width:140px;height:140px;margin:0 auto;position:relative;cursor:pointer;
  transition:.4s;filter:drop-shadow(0 0 28px rgba(255,215,0,.45));
}
#giftBox:hover{transform:scale(1.09) rotate(2deg);}
.giftBody{
  position:absolute;bottom:0;left:0;right:0;height:96px;
  background:linear-gradient(135deg,#d72645,#a01c35);border-radius:6px;
}
.giftLid{
  position:absolute;top:0;left:-6px;right:-6px;height:50px;
  background:linear-gradient(135deg,#e8364f,#c02040);border-radius:6px;
  transition:transform .55s cubic-bezier(.22,1,.36,1),opacity .5s;
}
#giftBox.opened .giftLid{transform:translateY(-55px) rotate(-12deg);opacity:0;}
.giftRibbonV{position:absolute;left:50%;transform:translateX(-50%);width:18px;height:100%;background:linear-gradient(#ffd700,#e8a000);z-index:2;border-radius:2px;}
.giftRibbonH{position:absolute;top:42%;transform:translateY(-50%);height:18px;width:100%;background:linear-gradient(90deg,#ffd700,#e8a000);z-index:2;border-radius:2px;}
.giftBow{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  width:44px;height:26px;z-index:3;
  background:radial-gradient(ellipse,#ffd700,#ff9900);
  border-radius:50%;
  box-shadow:-22px 0 0 6px #ffd700,22px 0 0 6px #ffd700;
}

/* ── GIFT REVEAL ─────────────────────────────────────── */
#giftReveal{
  display:flex;flex-wrap:wrap;gap:28px;justify-content:center;padding:60px 30px 80px;
  opacity:0;transform:translateY(44px);transition:opacity .85s,transform .85s;
}
#giftReveal.visible{opacity:1;transform:translateY(0);}
.giftCard{
  background:rgba(255,255,255,.05);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);border-radius:22px;
  padding:42px 28px;max-width:255px;text-align:center;
  transition:.35s;
}
.giftCard:hover{transform:translateY(-10px);border-color:rgba(255,150,190,.35);box-shadow:0 20px 50px rgba(0,0,0,.3);}
.giftIcon{font-size:50px;margin-bottom:16px;}
.giftCard h3{font-family:"Cinzel",serif;font-size:19px;color:#ffd8df;margin-bottom:14px;}
.giftCard p{font-size:14.5px;line-height:1.95;opacity:.82;}
.flowers{font-size:24px;margin:10px 0;}

/* ── AGE/COUNTDOWN BANNER ────────────────────────────── */
#ageBanner{
  padding:100px 30px;
  background:radial-gradient(ellipse at center,rgba(215,38,69,.15),transparent 70%);
}
#ageBanner h2{font-family:"Cinzel",serif;font-size:clamp(22px,4vw,38px);color:#ffd8df;margin-bottom:44px;}
.ageCounters{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;}
.ageBlock{
  background:rgba(255,255,255,.06);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:18px;
  padding:36px 40px;min-width:140px;text-align:center;transition:.35s;
}
.ageBlock:hover{transform:translateY(-6px);}
.ageNum{
  font-family:"Cinzel",serif;font-size:clamp(40px,7vw,64px);font-weight:700;
  background:linear-gradient(135deg,#ffd5df,#ffe89a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:countUp .6s ease;
}
@keyframes countUp{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.ageLabel{font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:.65;margin-top:8px;}

/* ── WISHING TREE ────────────────────────────────────── */
#wishTree{padding:120px 30px;position:relative;}
#wishTree h2{font-family:"Cinzel",serif;font-size:clamp(24px,4vw,42px);color:#ffe89a;margin-bottom:16px;text-shadow:0 0 20px rgba(255,230,100,.4);}
#wishTree>p{font-size:17px;opacity:.7;margin-bottom:58px;}
.tree{position:relative;width:220px;margin:0 auto;}
.treeTrunk{width:30px;height:100px;background:linear-gradient(to bottom,#6b3a1f,#4a2510);margin:0 auto;border-radius:4px;}
.treeLeaves{
  width:220px;height:190px;
  background:radial-gradient(ellipse at center,#1e6b1e,#0d3a0d);
  border-radius:52% 52% 42% 42%;
  margin:0 auto;display:flex;flex-wrap:wrap;
  align-items:center;justify-content:center;gap:14px;
  box-shadow:0 0 40px rgba(50,180,50,.2),inset 0 -20px 30px rgba(0,0,0,.2);
}
.leaf{font-size:22px;cursor:pointer;transition:.3s;display:inline-block;animation:leafSway 5s ease-in-out infinite;}
.leaf:nth-child(odd){animation-delay:1.2s;}
.leaf:hover{transform:scale(1.5);filter:brightness(1.6);}
@keyframes leafSway{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
#wishPopup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:rgba(15,8,35,.96);backdrop-filter:blur(18px);
  border:1px solid rgba(255,200,230,.2);border-radius:22px;
  padding:38px 54px;z-index:5000;transition:.35s cubic-bezier(.22,1,.36,1);
  box-shadow:0 24px 70px rgba(0,0,0,.65);max-width:340px;text-align:center;
}
#wishPopup.visible{transform:translate(-50%,-50%) scale(1);}
#wishText{font-size:20px;color:#ffd8df;line-height:1.8;}
#wishEmoji{font-size:36px;display:block;margin-bottom:12px;}

/* ── CONSTELLATION CANVAS ────────────────────────────── */
#constellationSection{
  padding:120px 30px;position:relative;overflow:hidden;
}
#constellationSection h2{font-family:"Cinzel",serif;font-size:clamp(24px,4vw,40px);color:#ffd8df;margin-bottom:14px;}
#constellationSection>p{font-size:17px;opacity:.7;margin-bottom:48px;}
#constellationCanvas{
  display:block;margin:0 auto;border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(5,10,30,.6);
  cursor:crosshair;max-width:100%;
}
.constellationHint{font-size:13px;opacity:.5;margin-top:18px;letter-spacing:.5px;}

/* ── NIGHT SCENE ─────────────────────────────────────── */
#nightScene{
  padding:140px 30px;
  background:radial-gradient(ellipse at top,rgba(20,30,80,.5),transparent 65%);
  position:relative;overflow:hidden;
}
#nightScene h2{font-family:"Cinzel",serif;font-size:clamp(24px,4vw,42px);color:#ffd8df;margin-bottom:16px;}
#nightScene>p{font-size:18px;opacity:.7;}
.moon{
  position:absolute;top:44px;left:50%;transform:translateX(-50%);
  width:82px;height:82px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fffde8,#f7e87a,#e8c84a);
  box-shadow:0 0 44px rgba(255,230,100,.65),0 0 90px rgba(255,200,80,.3);
  animation:moonFloat 8s ease-in-out infinite;
}
.shootingStar{
  position:absolute;top:80px;left:-60px;height:2px;width:130px;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.9),transparent);
  animation:shoot 7s linear infinite;border-radius:2px;
}
@keyframes shoot{0%{left:-100px;top:60px;opacity:1;}100%{left:110%;top:280px;opacity:0;}}
.nightLanterns{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.nightLanterns .nl{
  position:absolute;width:20px;height:28px;border-radius:50% 50% 40% 40%;
  background:linear-gradient(to bottom,#ffdd88,#ff8800);
  box-shadow:0 0 18px rgba(255,180,50,.7);
  animation:lanternRise 13s ease-in-out infinite;
}
.nightLanterns .nl:nth-child(1){left:8%; animation-delay:0s;}
.nightLanterns .nl:nth-child(2){left:25%;animation-delay:2.5s;}
.nightLanterns .nl:nth-child(3){left:50%;animation-delay:5s;}
.nightLanterns .nl:nth-child(4){left:72%;animation-delay:7.5s;}
.nightLanterns .nl:nth-child(5){left:90%;animation-delay:10s;}

/* ── FINAL WISH ──────────────────────────────────────── */
#finalWish{padding:140px 30px;position:relative;overflow:hidden;}
.wishOverlay{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(80,20,60,.4),transparent 70%);
}
.wishContainer reveal{position:relative;max-width:740px;margin:0 auto;}
.smallTitle{
  display:inline-block;letter-spacing:4px;text-transform:uppercase;
  font-size:11px;color:#ffd9e4;
